<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SD相册">
<link rel="apple-touch-icon" href="./logo_opt.png">
<link rel="manifest" href="./manifest.json">
<title>SD 相册</title>
<link rel="preload" href="./logo_opt.png" as="image">
<style>* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: #4a3f3c;
  background: url("./6431a428e4644036c567688a4a3f7069.jpg") fixed center / cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255, 210, 200, 0.35);
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 10px;
  background: transparent;
}

/* ===== 标题 Banner ===== */
.title-box {
  text-align: center;
  height: 70px;
  background:
    url("./logo_opt.png") center / contain no-repeat,
    linear-gradient(to bottom, transparent 40%, rgba(253,242,238,0.6) 100%);
}

.title-box h1 {
  display: none;
}

/* ===== 通用卡片 ===== */
.info-card,
.search-card,
.photo-card,
.schedule-card {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 16px;
  background: #fffdfb;
  border: none;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}

/* ===== 部长卡片 ===== */
.manager-card {
  background: #fef5f0;
}

.manager-label {
  font-size: 14px;
  font-weight: 500;
  color: #4a3f3c;
  min-width: 72px;
}

.manager-contact {
  font-size: 14px;
  color: #8b7a73;
  flex: 1;
  text-align: center;
}

.manager-note {
  text-align: center;
  font-size: 11px;
  color: #c4b5ad;
  margin-top: 2px;
}

/* ===== 信息行 ===== */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.info-row:last-child {
  margin-bottom: 0;
}

.info-row span {
  font-size: 14px;
  color: #6b5e5a;
}

/* ===== 按钮 ===== */
button {
  border: none;
  border-radius: 16px;
  background: #e8a598;
  color: #fff;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}

button:active {
  background: #d49082;
}

/* ===== 搜索 ===== */
.search-card {
  display: flex;
  gap: 8px;
}

.search-card input {
  flex: 1;
  height: 36px;
  padding: 0 12px;
  border: 1px solid #f0ddd6;
  border-radius: 18px;
  font-size: 14px;
  background: #fef9f6;
  color: #4a3f3c;
  outline: none;
}

.search-card input:focus {
  border-color: #e8a598;
}

.search-card input::placeholder {
  color: #c4b5ad;
}

/* ===== 照片区 ===== */
.photo-title {
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #8b7a73;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.photo-card-item {
  border-radius: 14px;
  background: #fef9f6;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05);
  transition: transform 0.15s;
  content-visibility: auto;
  contain-intrinsic-size: 1px 200px;
}

.photo-card-item:active {
  transform: scale(0.97);
}

.photo-card-item img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

.photo-label {
  text-align: center;
  padding: 6px 0;
  font-size: 13px;
  font-weight: 500;
  color: #6b5e5a;
  background: #fffdfb;
  letter-spacing: 1px;
}

/* ===== 排班表 ===== */
.schedule-card {
  margin-bottom: 20px;
  padding: 0;
  overflow: hidden;
}

.schedule-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  cursor: pointer;
  user-select: none;
}

.schedule-title {
  font-size: 14px;
  font-weight: 500;
  color: #4a3f3c;
}

.schedule-arrow {
  font-size: 12px;
  color: #c4b5ad;
  transition: transform 0.25s;
}

.schedule-arrow.open {
  transform: rotate(180deg);
}

.schedule-body {
  border-top: 1px solid #f5eae4;
  padding: 10px 12px;
}

.shift-group {
  margin-bottom: 6px;
  padding: 8px 10px;
  border-radius: 10px;
  background: #fefaf7;
}

.shift-label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
}

.shift-list {
  font-size: 13px;
  color: #7a6e68;
  line-height: 1.6;
  word-break: break-all;
}

.shift-morning { border-left: 3px solid #f0b090; }
.shift-mid     { border-left: 3px solid #a4b8d4; }
.shift-night   { border-left: 3px solid #b8a0c8; }
.shift-delay   { border-left: 3px solid #e8a090; }
.shift-rest    { border-left: 3px solid #a4c8a8; }
.shift-bought  { border-left: 3px solid #c4a898; }
.shift-sick    { border-left: 3px solid #e0a0b0; }
.shift-long    { border-left: 3px solid #a4b0b8; }
.shift-mleave  { border-left: 3px solid #c0a0c8; }

.schedule-note {
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 10px;
  background: #fef5ee;
  color: #b88060;
  font-size: 12px;
  border-left: 3px solid #f0c8a0;
}

/* ===== 全屏预览 ===== */
.image-viewer {
  display: none;
  position: fixed;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  background: rgba(30, 20, 15, 0.9);
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.image-viewer img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>

function showUsers(list){
  const g=document.getElementById("photoGrid");
  document.getElementById("photoTitle").innerText=list.length?"全部员工(共"+list.length+"人)":"暂无员工";
  g.innerHTML="";
  if(!list.length) return;
  const obs=new IntersectionObserver(function(e){e.forEach(function(e){if(e.isIntersecting){e.target.src=e.target.dataset.src;obs.unobserve(e.target)}})},{rootMargin:"600px"});
  list.forEach(function(u){
    const c=document.createElement("div");c.className="photo-card-item";
    const i=document.createElement("img");i.dataset.src=u.photo;i.alt=u.jobNo;i.onclick=function(){openViewer(u.photo)};
    const l=document.createElement("div");l.className="photo-label";l.innerText=u.jobNo;
    c.appendChild(i);c.appendChild(l);c.onclick=function(e){if(e.target.tagName!=="IMG")selectUser(u)};

  });
